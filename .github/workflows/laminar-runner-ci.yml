name: Laminar-Runner-CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-test-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Runner
        run: dotnet build build/Laminar.Runner/Laminar.Runner.csproj -c Debug

      - name: Run Tests
        run: dotnet test --no-build -c Debug --verbosity normal

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Application Smoke Test
        run: |
          timeout 15s xvfb-run dotnet run \
            --project build/Laminar.Runner/Laminar.Runner.csproj \
            --configuration Debug
